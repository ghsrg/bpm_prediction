experiment:
  # Глобальна назва проєкту (простору) в MLflow. Об'єднує всі експерименти в одну групу.
  project: "bpm_prediction_mvp1"
  # Логічне ім'я набору даних. Критично для фільтрації в MLflow (щоб не порівнювати різні логи).
  dataset: "permit_log"
  # Унікальна назва конкретного запуску (Run Name). Описує поточну гіпотезу або зміну.
  name: "GATv2_Baseline_FullFeatures"
  fraction: 0.1
  split_strategy: "temporal"
  train_ratio: 0.7
  split_ratio: [0.7, 0.2, 0.1]

seed: 42 # Фіксація генератора випадкових чисел для 100% відтворюваності результатів (split, ініціалізація ваг).

data:
  # Відносний або абсолютний шлях до сирого файлу журналу подій у форматі XES.
  log_path: "../Data/BPI Challenge 2020_ Travel Permit Data_1_all/PermitLog.xes"
  # Частка даних для завантаження (1.0 = всі дані, 0.1 = 10% для швидкого тесту пайплайну)
  # Стратегія розбиття: "time" (хронологічно, обов'язково для бізнес-процесів) або "random"
  # Пропорції для Train / Val / Test

mapping:
  # Тут описується FeatureConfig: звідки брати дані (source), як типізувати (dtype),
  # чим заповнювати пропуски (fill_na) та як кодувати для мережі (encoding: z-score, embedding, time2vec).

  xes_adapter:
    case_id_key: "concept:name"
    activity_key: "concept:name"
    timestamp_key: "time:timestamp"
    resource_key: "org:resource"
    lifecycle_key: "lifecycle:transition"
    version_key: "concept:version"
    complete_transitions: ["complete", "ate_abort", "pi_abort", "manualskip", "autoskip"]
    pairing_strategy: "lifo"
    use_classifier: true

  features:
    - name: "concept:name"
      role: "activity"
      source: "event"
      dtype: "string"
      fill_na: "<UNK>"
      encoding: ["embedding"]

    - name: "org:resource"
      role: "resource"
      source: "event"
      dtype: "string"
      fill_na: "UNKNOWN"
      encoding: ["embedding"]

    - name: "org:role"
      source: "event"
      dtype: "string"
      fill_na: "<UNK>"
      encoding: ["embedding"]

    - name: "time:timestamp"
      role: "timestamp"
      source: "event"
      dtype: "timestamp"
      fill_na: 0.0
      encoding:
        - "z-score"
        - "time2vec_dayofweek"
        - "time2vec_month"
        - "time2vec_weekofyear"
        - "time2vec_hour"
        - "time2vec_work_hours"

    - name: "duration"
      source: "event"
      dtype: "float"
      fill_na: 0.0
      encoding: ["z-score"]

    - name: "time_since_case_start"
      source: "event"
      dtype: "float"
      fill_na: 0.0
      encoding: ["z-score"]

    - name: "time_since_previous_event"
      source: "event"
      dtype: "float"
      fill_na: 0.0
      encoding: ["z-score"]

    - name: "RequestedBudget"
      source: "trace"
      dtype: "float"
      fill_na: 0.0
      encoding: ["z-score"]

    - name: "Overspent"
      source: "trace"
      dtype: "boolean"
      fill_na: false
      encoding: ["z-score"]

    - name: "OrganizationalEntity"
      source: "trace"
      dtype: "string"
      fill_na: "<UNK>"
      encoding: ["embedding"]

policies:
  # Профіль політик pre-encoding для MVP1 (без нормалізації синонімів/мовних варіацій).
  profile: "mvp1_default"
  activity_fallback_feature: "concept:name"
  zscore_clip:
    enabled: true
    min: -3.0
    max: 3.0
  time2vec:
    work_hours:
      timezone: "UTC"
      working_days: [0, 1, 2, 3, 4]
      start_hour: 9
      end_hour: 18
      # Варіанти для майбутніх наборів даних/організацій:
      # - Standard office: [0,1,2,3,4], 9..18
      # - Extended office: [0,1,2,3,4], 8..20
      # - Weekend only: [5,6], 8..20
      # - 24/7: [0,1,2,3,4,5,6], 0..24
      # - Night shift: [0,1,2,3,4], 22..6 (потрібна policy-логіка wrap-around)

model:
  # Клас архітектури графової нейромережі (наприклад: BaselineGCN, BaselineGATv2).
  type: "BaselineGATv2"
  # Розмірність прихованих шарів (векторів ознак всередині мережі).
  hidden_dim: 64
  # Відсоток нейронів, які вимикаються під час навчання для запобігання перенавчанню (0.0 - 1.0).
  dropout: 0.2
  # Стратегія побудови графа: "sequential_prefix" (лінійна послідовність подій), майбутні: "dfg", "eopkg".
  graph_strategy: "sequential_prefix"
  # Метод агрегації ознак вузлів у єдиний вектор графа: "global_mean" (середнє), "last_node" (фокус на останній події).
  pooling_strategy: "global_mean"

training:
  # Кількість графів (префіксів), які обробляються за один крок оптимізатора.
  batch_size: 128
  # Кількість повних проходів по всьому навчальному набору даних.
  epochs: 30
  # Швидкість навчання оптимізатора (Adam).
  learning_rate: 0.001
  # Кількість епох без покращення validation loss перед ранньою зупинкою
  patience: 10
  # Мінімальне покращення, яке вважається значущим
  delta: 1e-4
  # Апаратне прискорення: "cpu" (процесор) або "cuda" (NVIDIA GPU).
  device: "cpu"
  # Кількість кошиків для розрахунку метрики калібрування Expected Calibration Error (ECE).
  ece_bins: 10
  # Максимально допустима вага для дуже рідкісних класів (захист від вибуху градієнтів при сильному дисбалансі).
  class_weight_cap: 50.0
  # Функція втрат: "cross_entropy" (стандартна класифікація), у майбутньому можлива "focal_loss".
  loss_function: "cross_entropy"
  # Увімкнути/вимкнути загальний прогрес-бар у терміналі.
  show_progress: true
  # Повне вимкнення tqdm (корисно для запуску в Docker/CI без засмічення логів).
  tqdm_disable: false
  # Чи залишати прогрес-бар на екрані після завершення епохи.
  tqdm_leave: false

tracking:
  # Увімкнути/вимкнути запис метрик та параметрів (корисно вимикати для швидких дебаг-запусків).
  enabled: true
  # Система трекінгу. Зараз підтримується лише "mlflow".
  backend: "mlflow"
  # Локальна або віддалена адреса сервера MLflow (file:./mlruns зберігає дані локально в папці).
  uri: "file:./mlruns"
  # Додаткові мітки (Tags) для пошуку та угруповання в інтерфейсі MLflow.
  tags:
    stage: "mvp1_cross_dataset"
    model_family: "baseline_gnn"
