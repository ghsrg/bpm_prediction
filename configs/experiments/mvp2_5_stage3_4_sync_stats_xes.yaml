include:
  - "../data/mvp2_5_stage3_4_xes_neo4j.yaml"

sync_stats:
  enabled: true
  stats_time_policy: "strict_asof"
  process_scope_policy: "up_to_target_version"
  windows_days: [7, 30, 90]
  freshness_half_life_days: 14
  confidence_weights:
    sample_size: 0.4
    freshness: 0.3
    coverage: 0.3
  process_filters: []
  tenant_filters: []
  show_progress: true

experiment:
  mode: "train"

seed: 42
