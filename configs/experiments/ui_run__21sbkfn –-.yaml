data:
  dataset_label: DD_RIO_2.5
  dataset_name: RIO2.5k.versioned
  log_path: C:\Users\korsr\PycharmProjects\Data\Business Process Drift\logs\RIO\RIO2.5k.versioned.xes
mapping:
  adapter: xes
  knowledge_graph:
    backend: neo4j
    path: data/knowledge_graph
    strict_load: true
    ingest_split: train
  graph_feature_mapping:
    enabled: true
    node_numeric:
    - name: node_exec_count_v_all
      metric: exec_count
      window: all_time
      scope: version
      default: 0.0
      encoding:
      - identity
    - name: node_duration_median_v_all
      metric: duration_median
      window: all_time
      scope: version
      default: 0.0
      encoding:
      - identity
    - name: node_duration_p95_v_all
      metric: duration_p95
      window: all_time
      scope: version
      default: 0.0
      encoding:
      - identity
    - name: node_loop_density_v_all
      metric: loop_density
      window: all_time
      scope: version
      default: 0.0
      encoding:
      - identity
    - name: node_parallel_var_v_all
      metric: parallel_token_variance
      window: all_time
      scope: version
      default: 0.0
      encoding:
      - identity
    - name: node_freshness_v_all
      metric: freshness_score
      window: all_time
      scope: version
      default: 0.0
      encoding:
      - identity
    - name: node_confidence_v_all
      metric: confidence_score
      window: all_time
      scope: version
      default: 0.0
      encoding:
      - identity
    - name: node_exec_count_p_all
      metric: exec_count
      window: all_time
      scope: process
      default: 0.0
      encoding:
      - identity
    - name: node_duration_median_p_all
      metric: duration_median
      window: all_time
      scope: process
      default: 0.0
      encoding:
      - identity
    - name: node_duration_p95_p_all
      metric: duration_p95
      window: all_time
      scope: process
      default: 0.0
      encoding:
      - identity
    - name: node_loop_density_p_all
      metric: loop_density
      window: all_time
      scope: process
      default: 0.0
      encoding:
      - identity
    - name: node_parallel_var_p_all
      metric: parallel_token_variance
      window: all_time
      scope: process
      default: 0.0
      encoding:
      - identity
    - name: node_freshness_p_all
      metric: freshness_score
      window: all_time
      scope: process
      default: 0.0
      encoding:
      - identity
    - name: node_confidence_p_all
      metric: confidence_score
      window: all_time
      scope: process
      default: 0.0
      encoding:
      - identity
    edge_weight:
      metric: transition_probability
      window: all_time
      scope: version
      default: 1.0
      encoding:
      - identity
    stats_quality_gate:
      enabled: true
      on_fail: allow_with_warning
      warn_on_fail: true
  xes_adapter:
    case_id_key: concept:name
    activity_key: concept:name
    timestamp_key: time:timestamp
    resource_key: org:resource
    lifecycle_key: lifecycle:transition
    version_key: concept:version
    start_transitions:
    - assign
    complete_transitions:
    - complete
    pairing_strategy: lifo
    use_classifier: false
  features:
  - name: concept:name
    role: activity
    source: event
    dtype: string
    fill_na: <UNK>
    encoding:
    - embedding
  - name: org:resource
    role: resource
    source: event
    dtype: string
    fill_na: UNKNOWN
    encoding:
    - embedding
  - name: time:timestamp
    role: timestamp
    source: event
    dtype: timestamp
    fill_na: 0.0
    encoding:
    - z-score
    - time2vec_dayofweek
    - time2vec_hour
    - time2vec_work_hours
  - name: duration
    source: event
    dtype: float
    fill_na: 0.0
    encoding:
    - z-score
  - name: time_since_case_start
    source: event
    dtype: float
    fill_na: 0.0
    encoding:
    - z-score
  - name: time_since_previous_event
    source: event
    dtype: float
    fill_na: 0.0
    encoding:
    - z-score
policies:
  profile: mvp1_default
  activity_fallback_feature: concept:name
  zscore_clip:
    enabled: true
    min: -3.0
    max: 3.0
  time2vec:
    work_hours:
      timezone: UTC
      working_days:
      - 0
      - 1
      - 2
      - 3
      - 4
      start_hour: 9
      end_hour: 18
model:
  model_label: GATv2
  type: BaselineGATv2
  hidden_dim: 64
  struct_encoder_type: GATv2Conv
  struct_hidden_dim: 64
  cross_attention_heads: 4
  dropout: 0.2
  graph_strategy: sequential_prefix
  pooling_strategy: global_mean
training:
  batch_size: 128
  epochs: 50
  learning_rate: 0.001
  patience: 10
  delta: 1e-4
  device: cpu
  ece_bins: 10
  class_weight_cap: 50.0
  loss_function: cross_entropy
  show_progress: true
  tqdm_disable: false
  tqdm_leave: false
  retrain: false
  dataloader_num_workers: 0
  dataloader_persistent_workers: true
  dataloader_pin_memory: false
  dataloader_prefetch_factor: 2
  torch_num_interop_threads: 2
  torch_num_threads: 8
tracking:
  enabled: true
  backend: mlflow
  uri: file:./mlruns
  tags:
    stage: mvp1_cross_dataset
    model_family: baseline_gnn
experiment:
  project: mvp2_5_DD
  name: Baseline_42
  mode: sync-topology
  fraction: 1.0
  split_strategy: temporal
  train_ratio: 0.2
  split_ratio:
  - 0.7
  - 0.2
  - 0.1
  stats_time_policy: latest
  on_missing_asof_snapshot: use_base
  cache_policy: full
  graph_dataset_cache_policy: full
  graph_dataset_cache_dir: .cache/graph_datasets
  graph_dataset_disk_spill_enabled: true
  cache_dir: .cache/dynamic_graph_builder
  graph_dataset_shard_size: 20000
  max_ram_gb: 10
  drift_window_size: 100
  drift_window_sliding: 10
seed: 42
