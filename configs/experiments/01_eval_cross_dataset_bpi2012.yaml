include:
  - "../data/bpi2020_Travel_Permit_1-test.yaml"
  - "../model/gatv2_baseline.yaml"

experiment:
  project: "bpm_prediction_mvp1"
  name: "MVP1_CrossDataset_Test"
  mode: "eval_cross_dataset"
  fraction: 0.1
  split_strategy: "temporal"
  train_ratio: 0.7
  split_ratio: [0.0, 0.0, 1.0]
  load_checkpoint: "checkpoints/MVP1_Baseline_train_bpi2012_GATv2_best.pth"

training:
  retrain: false

seed: 42
