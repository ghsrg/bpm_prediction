data:
  dataset_label: "camunda_sync_files_file"
  dataset_name: "camunda_sync"
  log_path: "__camunda__"

mapping:
  adapter: "camunda"
  knowledge_graph:
    backend: "file"
    path: "data/knowledge_graph"
    strict_load: false
    ingest_split: "full"

  camunda_adapter:
    # Empty process_filters => full sync for all process definitions in catalog.
    process_filters: []
    # Optional tenant scope. Empty => all tenants.
    tenant_id: ""
    tenant_filters: []
    structure:
      source: "bpmn"
      structure_from_logs: false
      bpmn_source: "files"
      parser_mode: "recover"
      subprocess_mode: "flattened-no-subprocess-node"
      files:
        export_dir: "data/camunda_exports"
        catalog_file: "process_definitions.csv"
        bpmn_dir: "data/camunda_exports/bpmn_xml"
      call_activity:
        inference_fallback_strategy: "use_aggregated_stats"

experiment:
  project: "bpm_prediction_mvp2_5"
  name: "MVP2_5_Stage4_2_Sync_Camunda_Files_File"
  mode: "train"
