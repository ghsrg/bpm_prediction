include:
  - "../data/mvp2_5_stage3_4_xes_file.yaml"
  - "../model/gatv2_baseline.yaml"

experiment:
  project: "bpm_prediction_mvp2_5"
  name: "MVP2_5_Stage3_4_Baseline_XES"
  mode: "train"
  fraction: 0.1
  split_strategy: "temporal"
  train_ratio: 0.7
  split_ratio: [0.7, 0.2, 0.1]
  stats_time_policy: "strict_asof"

training:
  retrain: true

seed: 42
