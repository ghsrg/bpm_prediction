include:
  - "../data/2015_cb_DataDrift.yaml"
  - "../model/gatv2_baseline.yaml"

experiment:
  project: "bpm_prediction_mvp1"
  name: "MVP1_cbdrift500-50"
  mode: "eval_drift"
  fraction: 1
  split_strategy: "temporal"
  train_ratio: 0.01
  split_ratio: [0.7, 0.2, 0.1]
  load_checkpoint: "checkpoints/MVP1_train_DataDrift_1_synthetic_drift_4tu_GATv2_best.pth"
  drift_window_size: 500
  drift_window_sliding: 50

training:
  retrain: false

seed: 42
