    path: experiment.graph_dataset_disk_spill_enabled
    section: experiment
    label: experiment.graph_dataset_disk_spill_enabled
    description: Enable sharded disk spill for build_graph to keep RAM bounded.
    affects: Memory usage during graph dataset build and cache write path.
    default: 'false'
    enum:
    - 'false'
    - 'true'
    required_in_modes: []
    required_when: {}
