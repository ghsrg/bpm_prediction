include:
  - "../data/mvp2_5_stage4_2_camunda_files_stat.yaml"
  - "../model/gatv2_baseline.yaml"

experiment:
  project: "bpm_prediction_mvp2_5"
  name: "MVP2_5_Stage4_2_Baseline_Files_Stat"
  mode: "train"
  fraction: 1.0
  split_strategy: "temporal"
