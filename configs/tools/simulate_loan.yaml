simulation:
  process_name: "loan_sim_v1_v4"
  random_seed: 42
  start_time: "2025-01-01T00:00:00Z"
  end_time: "2025-05-01T00:00:00Z"

versions:
  - version_id: "v1"
    active_from: "2025-01-01T00:00:00Z"
    bpmn_path: "../../data/camunda_exports/bpmn_xml/loan_v1.bpmn"
  - version_id: "v2"
    active_from: "2025-02-01T00:00:00Z"
    bpmn_path: "../../data/camunda_exports/bpmn_xml/loan_v2_re.bpmn"
  - version_id: "v3"
    active_from: "2025-03-01T00:00:00Z"
    bpmn_path: "../../data/camunda_exports/bpmn_xml/loan_v3_re_pl.bpmn"
  - version_id: "v4"
    active_from: "2025-04-01T00:00:00Z"
    bpmn_path: "../../data/camunda_exports/bpmn_xml/loan_v4_re_pl_cb.bpmn"

arrival_process:
  type: "poisson"
  rate_per_hour: 1.74
  max_cases: 6000

case_attributes:
  risk_score:
    type: "beta"
    alpha: 2.0
    beta: 5.0
  p_form_rework:
    type: "uniform"
    min: 0.0
    max: 1.0
  p_revise:
    type: "uniform"
    min: 0.0
    max: 1.0
  p_big_loop:
    type: "uniform"
    min: 0.0
    max: 1.0
  p_cancel:
    type: "uniform"
    min: 0.0
    max: 1.0
  p_quote:
    type: "uniform"
    min: 0.0
    max: 1.0
  p_branch:
    type: "uniform"
    min: 0.0
    max: 1.0

resources:
  roles:
    clerk:
      workers:
        - id: "clerk_1"
          factor: 1.00
        - id: "clerk_2"
          factor: 0.95
        - id: "clerk_3"
          factor: 1.10
        - id: "clerk_4"
          factor: 1.05
        - id: "clerk_5"
          factor: 0.90
        - id: "clerk_6"
          factor: 1.15
        - id: "clerk_7"
          factor: 1.00
        - id: "clerk_8"
          factor: 0.98
        - id: "clerk_9"
          factor: 1.08
        - id: "clerk_10"
          factor: 0.92

