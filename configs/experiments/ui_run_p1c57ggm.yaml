data:
  dataset_label: bpi2012_stage4_2_xes_stat
  dataset_name: BPI_Challenge_2012
  log_path: C:\Users\korsr\PycharmProjects\Data\BPI Challenge 2012_1_all\BPI_Challenge_2012.xes
mapping:
  adapter: xes
  knowledge_graph:
    backend: neo4j
    path: data/knowledge_graph
    strict_load: true
    ingest_split: train
  graph_feature_mapping:
    enabled: true
    node_numeric:
    - name: node_exec_count_v_all
      metric: exec_count
      window: all_time
      scope: version
      default: 0.0
      encoding:
      - z-score
    edge_weight:
      metric: transition_probability
      window: all_time
      scope: version
      default: 1.0
      encoding:
      - identity
    stats_quality_gate:
      enabled: true
      on_fail: allow_with_warning
      warn_on_fail: true
  xes_adapter:
    case_id_key: concept:name
    activity_key: concept:name
    timestamp_key: time:timestamp
    resource_key: org:resource
    lifecycle_key: lifecycle:transition
    version_key: concept:version
    complete_transitions:
    - COMPLETE
    - complete
    - ate_abort
    - pi_abort
    - manualskip
    - autoskip
    pairing_strategy: lifo
    use_classifier: false
  features:
  - name: concept:name
    role: activity
    source: event
    dtype: string
    fill_na: <UNK>
    encoding:
    - embedding
  - name: org:resource
    role: resource
    source: event
    dtype: string
    fill_na: UNKNOWN
    encoding:
    - embedding
  - name: time:timestamp
    role: timestamp
    source: event
    dtype: timestamp
    fill_na: 0.0
    encoding:
    - z-score
    - time2vec_dayofweek
    - time2vec_hour
    - time2vec_work_hours
  - name: duration
    source: event
    dtype: float
    fill_na: 0.0
    encoding:
    - z-score
  - name: time_since_case_start
    source: event
    dtype: float
    fill_na: 0.0
    encoding:
    - z-score
  - name: time_since_previous_event
    source: event
    dtype: float
    fill_na: 0.0
    encoding:
    - z-score
policies:
  profile: mvp1_default
  activity_fallback_feature: concept:name
  zscore_clip:
    enabled: true
    min: -3.0
    max: 3.0
  time2vec:
    work_hours:
      timezone: UTC
      working_days:
      - 0
      - 1
      - 2
      - 3
      - 4
      start_hour: 9
      end_hour: 18
model:
  model_label: GATv2
  type: EOPKGGATv2
  hidden_dim: 64
  struct_encoder_type: GATv2Conv
  struct_hidden_dim: 64
  cross_attention_heads: 4
  dropout: 0.2
  graph_strategy: sequential_prefix
  pooling_strategy: global_mean
training:
  batch_size: 8
  epochs: 30
  learning_rate: 0.001
  patience: 10
  delta: 1e-4
  device: cpu
  ece_bins: 10
  class_weight_cap: 50.0
  loss_function: cross_entropy
  show_progress: true
  tqdm_disable: false
  tqdm_leave: false
  retrain: true
  dataloader_num_workers: 2
  dataloader_persistent_workers: true
  dataloader_pin_memory: false
  dataloader_prefetch_factor: 2
  torch_num_interop_threads: 2
  torch_num_threads: 8
tracking:
  enabled: true
  backend: mlflow
  uri: file:./mlruns
  tags:
    stage: mvp1_cross_dataset
    model_family: baseline_gnn
experiment:
  project: bpm_prediction_mvp2_5
  name: MVP2_5_Stage4_2_EOPKG_XES_Stat
  mode: train
  fraction: 0.5
  split_strategy: temporal
  train_ratio: 0.7
  split_ratio:
  - 0.7
  - 0.2
  - 0.1
  stats_time_policy: latest
  on_missing_asof_snapshot: use_base
  cache_policy: full
  graph_dataset_cache_policy: full
  graph_dataset_cache_dir: .cache/graph_datasets
  graph_dataset_disk_spill_enabled: true
  cache_dir: .cache/dynamic_graph_builder
  graph_dataset_shard_size: 20000
  max_ram_gb: 10
  drift_window_size: 500
  drift_window_sliding: 100
seed: 42
