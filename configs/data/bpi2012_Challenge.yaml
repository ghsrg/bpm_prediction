data:
  dataset_label: "bpi2012"
  log_path: "../Data/BPI Challenge 2012_1_all/BPI_Challenge_2012.xes"

mapping:
  xes_adapter:
    case_id_key: "concept:name"
    activity_key: "concept:name"
    timestamp_key: "time:timestamp"
    resource_key: "org:resource"
    lifecycle_key: "lifecycle:transition"
    version_key: "concept:version"
    complete_transitions: ["COMPLETE", "complete", "ate_abort", "pi_abort", "manualskip", "autoskip"]
    pairing_strategy: "lifo"
    use_classifier: true
  knowledge_graph:
    backend: "file"
    path: "data/knowledge_graph"
    strict_load: false
    ingest_split: "train"

  features:
    - name: "concept:name"
      role: "activity"
      source: "event"
      dtype: "string"
      fill_na: "<UNK>"
      encoding: ["embedding"]

    - name: "org:resource"
      role: "resource"
      source: "event"
      dtype: "string"
      fill_na: "UNKNOWN"
      encoding: ["embedding"]

    - name: "time:timestamp"
      role: "timestamp"
      source: "event"
      dtype: "timestamp"
      fill_na: 0.0
      encoding:
        - "z-score"
        - "time2vec_dayofweek"
        - "time2vec_month"
        - "time2vec_weekofyear"
        - "time2vec_hour"
        - "time2vec_work_hours"

    - name: "duration"
      source: "event"
      dtype: "float"
      fill_na: 0.0
      encoding: ["z-score"]

    - name: "time_since_case_start"
      source: "event"
      dtype: "float"
      fill_na: 0.0
      encoding: ["z-score"]

    - name: "time_since_previous_event"
      source: "event"
      dtype: "float"
      fill_na: 0.0
      encoding: ["z-score"]

    - name: "AMOUNT_REQ"
      source: "trace"
      dtype: "float"
      fill_na: 0.0
      encoding: ["z-score"]

policies:
  profile: "mvp1_default"
  activity_fallback_feature: "concept:name"
  zscore_clip:
    enabled: true
    min: -3.0
    max: 3.0
  time2vec:
    work_hours:
      timezone: "UTC"
      working_days: [0, 1, 2, 3, 4]
      start_hour: 9
      end_hour: 18
      # Типові профілі для розширення (без коду):
      # - Mon-Fri 09:00-18:00 -> [0,1,2,3,4], 9..18
      # - 24/7 -> [0,1,2,3,4,5,6], 0..24
      # - Weekend shifts -> [5,6], 8..20
      # - Night shifts -> [0,1,2,3,4], 22..6 (потребує окремої policy-логіки)
