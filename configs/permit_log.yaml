experiment:
  name: "PermitLog"
  dataset: "permit_log"
  project: "bpm_prediction_mvp1"

seed: 42

data:
  log_path: "../Data/BPI Challenge 2020_ Travel Permit Data_1_all/PermitLog.xes"

mapping:
  xes_adapter:
    case_id_key: "concept:name"
    activity_key: "concept:name"
    timestamp_key: "time:timestamp"
    resource_key: "org:resource"
    lifecycle_key: "lifecycle:transition"
    version_key: "concept:version"
    complete_transitions: ["complete", "ate_abort", "pi_abort", "manualskip", "autoskip"]
    pairing_strategy: "lifo"
    use_classifier: true

  features:
    - name: "concept:name"
      role: "activity"
      source: "event"
      dtype: "string"
      fill_na: "<UNK>"
      encoding: ["embedding"]

    - name: "org:resource"
      role: "resource"
      source: "event"
      dtype: "string"
      fill_na: "UNKNOWN"
      encoding: ["embedding"]

    - name: "org:role"
      source: "event"
      dtype: "string"
      fill_na: "<UNK>"
      encoding: ["embedding"]

    - name: "time:timestamp"
      role: "timestamp"
      source: "event"
      dtype: "timestamp"
      fill_na: 0.0
      encoding:
        - "z-score"
        - "time2vec_dayofweek"
        - "time2vec_month"
        - "time2vec_weekofyear"
        - "time2vec_hour"
        - "time2vec_work_hours"

    - name: "duration"
      source: "event"
      dtype: "float"
      fill_na: 0.0
      encoding: ["z-score"]

    - name: "time_since_case_start"
      source: "event"
      dtype: "float"
      fill_na: 0.0
      encoding: ["z-score"]

    - name: "time_since_previous_event"
      source: "event"
      dtype: "float"
      fill_na: 0.0
      encoding: ["z-score"]

    - name: "RequestedBudget"
      source: "trace"
      dtype: "float"
      fill_na: 0.0
      encoding: ["z-score"]

    - name: "Overspent"
      source: "trace"
      dtype: "boolean"
      fill_na: false
      encoding: ["z-score"]

    - name: "OrganizationalEntity"
      source: "trace"
      dtype: "string"
      fill_na: "<UNK>"
      encoding: ["embedding"]

model:
  type: "BaselineGATv2"
  hidden_dim: 64
  dropout: 0.2

training:
  batch_size: 128
  epochs: 30
  learning_rate: 0.001
  device: "cpu"
  ece_bins: 10
  class_weight_cap: 50.0
  show_progress: true
  tqdm_disable: false
  tqdm_leave: false

tracking:
  enabled: true
  backend: "mlflow"
  uri: "file:./mlruns"
  tags:
    stage: "mvp1"
    model_family: "baseline_gnn"
