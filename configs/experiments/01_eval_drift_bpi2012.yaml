include:
  - "../data/bpi2012_Challenge.yaml"
  - "../model/gatv2_baseline.yaml"

experiment:
  project: "bpm_prediction_mvp1"
  name: "MVP1_drift1000-200"
  mode: "eval_drift"
  fraction: 1
  split_strategy: "temporal"
  train_ratio: 0.4
  split_ratio: [0.7, 0.2, 0.1]
  load_checkpoint: "checkpoints/MVP1_Baseline_train_1_bpi2012_GATv2_best.pth"
  drift_window_size: 1000
  drift_window_sliding: 200

training:
  retrain: false

seed: 42
